groups:
  - name: "UI"
    description: "React frontend components and pages"
  - name: "API"
    description: "HTTP API handlers and worker middleware"
  - name: "Graph Extraction"
    description: "TypeScript import graph parsing and group dependency analysis"
  - name: "Classification"
    description: "File classification, heuristics, and group configuration"
  - name: "Types"
    description: "Shared type definitions and interfaces"

overrides:
  - pattern: "frontend/**"
    group: "UI"
  - pattern: "worker/**"
    group: "API"
  - pattern: "graph/src/extract.ts"
    group: "Graph Extraction"
  - pattern: "graph/src/cli.ts"
    group: "Graph Extraction"
  - pattern: "graph/src/group-graph.ts"
    group: "Graph Extraction"
  - pattern: "graph/src/index.ts"
    group: "Graph Extraction"
  - pattern: "graph/src/generate-data.ts"
    group: "Graph Extraction"
  - pattern: "graph/src/types.ts"
    group: "Types"
  - pattern: "graph/src/config.ts"
    group: "Classification"
  - pattern: "graph/src/classify.ts"
    group: "Classification"
  - pattern: "graph/src/heuristics.ts"
    group: "Classification"
